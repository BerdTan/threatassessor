# ThreatAssessor — operator settings
#
# This file is committed to the repo and documents the current provider and
# embedding configuration. It is loaded between the Python defaults and
# user_config.json (which is gitignored and holds personal overrides).
#
# Load order: AppSettings Python defaults → settings.yaml (this file) → user_config.json
#
# To activate a new provider, uncomment its block and set the corresponding
# environment variable. No Python code changes required.

# ---------------------------------------------------------------------------
# LLM provider registry
# ---------------------------------------------------------------------------
providers:
  providers:
    openrouter:
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: "OPENROUTER_API_KEY"
      auth_type: "bearer"

    bedrock:
      base_url: ""
      api_key_env: null
      auth_type: "sigv4"

    # ── Uncomment to activate ────────────────────────────────────────────────
    # doubleword:
    #   base_url: "https://api.doubleword.ai/v1"
    #   api_key_env: "DOUBLEWORD_API_KEY"
    #   auth_type: "bearer"

    # sakana:
    #   base_url: "https://api.sakana.ai/v1"
    #   api_key_env: "SAKANA_API_KEY"
    #   auth_type: "bearer"

    # ollama:
    #   base_url: "http://localhost:11434/v1"
    #   api_key_env: null
    #   auth_type: "none"

    # vllm_local:
    #   base_url: "http://localhost:8000/v1"
    #   api_key_env: null
    #   auth_type: "none"

    # vllm_cloud:
    #   base_url: "https://your-vllm-endpoint/v1"
    #   api_key_env: "VLLM_API_KEY"
    #   auth_type: "bearer"

# ---------------------------------------------------------------------------
# Embedding model (used by MITRE technique similarity search)
# ---------------------------------------------------------------------------
embedding:
  provider: "openrouter"
  model: "nvidia/llama-nemotron-embed-vl-1b-v2:free"
  dimensions: 2048

# ---------------------------------------------------------------------------
# Per-agent model assignments (HarnessModelGuardian is the sole broker)
#
# Model strings are resolved from env vars at startup — no secrets here.
# If an env var is unset the slot is empty and Guardian falls through to the
# primary provider default (LLM_PROVIDER + BEDROCK_MODEL from .env).
#
# Example .env entries:
#   AGENT_MODEL_ARCHITECT=bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0
#   AGENT_MODEL_TA_WIZ=bedrock/us.anthropic.claude-haiku-4-20250514-v1:0
# ---------------------------------------------------------------------------
agent_models:
  architect:        {model: "${AGENT_MODEL_ARCHITECT}"}
  tester:           {model: "${AGENT_MODEL_TESTER}"}
  red_team:         {model: "${AGENT_MODEL_RED_TEAM}"}
  scrum_master:     {model: "${AGENT_MODEL_SCRUM_MASTER}"}
  moe_orchestrator: {model: "${AGENT_MODEL_MOE}"}
  threat_analyst:   {model: "${AGENT_MODEL_THREAT_ANALYST}"}
  tatb_labeller:    {model: "${AGENT_MODEL_TATB_LABELLER}", fallbacks: ["${AGENT_MODEL_TATB_LABELLER_FALLBACK}"]}
  ta_wiz:           {model: "${AGENT_MODEL_TA_WIZ}"}
