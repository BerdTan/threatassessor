# CAVEAT → MITRE ATT&CK Cloud Technique Mapping
#
# Hand-authored. Maps each CAVEAT technique title to MITRE ATT&CK sub-technique IDs
# (primarily T1xxx.00x cloud sub-techniques from the Enterprise matrix).
#
# caveat_native: true  → no direct MITRE equivalent; technique is CAVEAT-specific.
# notes              → explains the mapping rationale or gap.
#
# MITRE references:
#   https://attack.mitre.org/techniques/enterprise/  (filter: "cloud" platform)
#
# Maintained alongside scripts/data/fetch_caveat.py
# Last reviewed: 2026-06-01

